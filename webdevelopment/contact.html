    <h1>Contact Me!</h1>
</header>
<main>
<div class="form">
<label>Your Information:</label>
<form>
<ul>
    <li><label>Name:</label>
        <select name="Title" size="1" required>
<option>Mr.</option>
<option>Ms.</option>
<option>Mrs.</option>
<option>Dr.</option>
</select>
<input type="text" name="customername" placeholder="Your name" required>
    </li>
    <li><label>Address:</label>
        <input type="text" name="address" placeholder="Your address" required>
    </li>
    <li><label>Telephone Number:</label>
        <input type="tel" name="telephone" placeholder="Your phone number" required>
    </li>
    <li><label>Email:</label>
        <input type="email" name="email" placeholder="Your email" required>
    </li>
<label>Tell me about yourself!</label>
        <br><textarea name="response" rows="4" cols="60" maxlength="400" placeholder="No more than 400 characters long" required></textarea>
<br>
<label>What can I help you with? Please choose all that apply.</label>
<li><input type="checkbox" name="job type" value="photo">Photo</li>
<li><input type="checkbox" name="job type" value="video">Video</li>
<li><input type="radio" name="job" value="senior">Senior Session</li>
<li><input type="radio" name="job" value="wedding">Wedding</li>
<li><input type="radio" name="job" value="worship">Worship</li>
<li><input type="radio" name="job" value="documentary">Documentary</li>
<li><input type="radio" name="job" value="shortfilm">Short Film</li>
</ul>
<p><input type="submit" value="Thank You!">
<br>
<br><input type="reset"></p>
</form>
</div>
</main>
